name: 自动备份

on:
  schedule:
    - cron: '0 * * * *'  # 每小时备份一次
  workflow_dispatch:     # 手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: 配置 Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
      
      - name: 检查更改
        run: git status
      
      - name: 提交并推送
        run: |
          git add .
          git commit -m "auto: 每小时备份 - $(date +%Y-%m-%d-%H-%M)" || echo "无更改"
          git push
